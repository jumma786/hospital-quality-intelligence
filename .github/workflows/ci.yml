name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # Lightweight: the unit tests validate cleaning + the leakage guard and
        # only need pandas/numpy/scikit-learn — not shap/streamlit or the raw CSVs.
        run: pip install pandas numpy scikit-learn pytest

      - name: Run test suite
        run: pytest ml/tests -v
